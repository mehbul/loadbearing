<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Loadbearing - performance engineering for apps built with AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M1,1 L5,8 L9,1" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="none"/>

  <!-- subtle grid -->
  <g stroke="#141A2E" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- left text block -->
  <text x="90" y="150" fill="#8B949E" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" letter-spacing="3">OPEN-SOURCE PERFORMANCE PACK &#183; MIT</text>

  <text x="86" y="300" fill="#FFFFFF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="96" font-weight="700">Loadbearing</text>
  <rect x="92" y="322" width="190" height="7" rx="3" fill="url(#beam)"/>

  <text x="90" y="392" fill="#C9D1D9" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="600">Performance engineering for apps built with AI</text>
  <text x="90" y="436" fill="#8B949E" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23">Catch slow patterns as you code &#183; load-test what you ship &#183; honestly</text>

  <text x="90" y="520" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#6E7681">Works with
    <tspan fill="#C9D1D9" font-weight="600">Claude</tspan> &#183;
    <tspan fill="#C9D1D9" font-weight="600">Codex</tspan> &#183;
    <tspan fill="#C9D1D9" font-weight="600">Cursor</tspan> &#183;
    <tspan fill="#C9D1D9" font-weight="600">Grok</tspan> &#183;
    <tspan fill="#C9D1D9" font-weight="600">Hermes</tspan>
  </text>

  <!-- right: load-bearing beam motif -->
  <g transform="translate(40,0)">
    <!-- load arrows -->
    <line x1="960" y1="250" x2="960" y2="352" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="1040" y1="230" x2="1040" y2="352" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="1120" y1="250" x2="1120" y2="352" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="1040" y="205" fill="#6E7681" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" text-anchor="middle" letter-spacing="2">LOAD</text>
    <!-- beam -->
    <rect x="900" y="360" width="280" height="18" rx="5" fill="url(#beam)"/>
    <!-- supports -->
    <rect x="918" y="378" width="18" height="86" fill="#2D3350"/>
    <rect x="1144" y="378" width="18" height="86" fill="#2D3350"/>
    <!-- ground -->
    <rect x="884" y="464" width="312" height="8" rx="3" fill="#2D3350"/>
  </g>
</svg>
